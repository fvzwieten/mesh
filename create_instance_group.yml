---
- name: Deploy AAP Instance Group
  # INPUT as extra vars:
  # - instance_group_name as the instance group name
  hosts: all
  connection: local
  gather_facts: false
  vars:
    controller_username: "{{ lookup('env', 'CONTROLLER_USERNAME') }}"
    controller_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
    controller_hostname: "{{ lookup('env', 'CONTROLLER_HOSTNAME') }}"
    controller_validate_certs: "{{ lookup('env', 'CONTROLLER_VERIFY_SSL') }}"

  tasks:
    - name: Create Instance Group
      ansible.controller.instance_group:
        name: "{{ instance_group_name }}"
        state: present
        # Optional: set up how many tasks are allowed to run
        max_concurrent_jobs: 20
        max_forks: 200
        # Policy for automatic addtion of instances (0 = manual)
        policy_instance_percentage: 0
        policy_instance_minimum: 0
      delegate_to: localhost
      register: ig_result

    - name: Show result
      ansible.builtin.debug:
        var: ig_result
